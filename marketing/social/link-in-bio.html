<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Skipily — Always · Safe · Ready to Sail</title>
<meta name="description" content="Skipily: marine service on the map plus an AI boat engineer. Get the app or claim your provider profile.">
<style>
  :root { --navy:#0B1D3A; --navy2:#13294d; --orange:#f97316; --orange-dark:#ea580c; --muted:#cbd5e1; }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; background:var(--navy); color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    display:flex; align-items:center; justify-content:center; padding:24px 20px 32px; overflow-x:hidden; }
  .wrap { width:100%; max-width:440px; text-align:center; }
  .langs { display:flex; gap:6px; justify-content:center; flex-wrap:wrap; margin-bottom:18px; }
  .langs button { background:transparent; border:1px solid #27457a; color:#94a3b8; border-radius:8px;
    padding:4px 9px; font-size:12px; font-weight:700; cursor:pointer; text-transform:uppercase; }
  .langs button.active { background:var(--orange); color:var(--navy); border-color:var(--orange); }
  .logo { width:88px; height:88px; border-radius:20px; display:block; margin:0 auto 18px; box-shadow:0 10px 30px rgba(0,0,0,.35); }
  h1 { margin:0; font-size:30px; font-weight:800; letter-spacing:6px; }
  .tag { margin:8px 0 4px; color:var(--orange); font-size:12px; font-weight:700; letter-spacing:2px; }
  .lead { margin:18px 0 26px; color:var(--muted); font-size:16px; line-height:1.6; }
  .btn { display:flex; align-items:center; gap:14px;
    width:100%; padding:16px 20px; margin:12px 0; border-radius:14px; text-decoration:none;
    font-size:17px; font-weight:700; transition:transform .08s ease, background .15s ease; }
  .btn:active { transform:scale(.985); }
  .btn-primary { background:var(--orange); color:var(--navy); }
  .btn-primary:hover { background:var(--orange-dark); }
  .btn-secondary { background:var(--navy2); color:#fff; border:1px solid #27457a; }
  .btn-secondary:hover { background:#19315c; }
  .btn .ico { flex:0 0 auto; font-size:24px; line-height:1; width:28px; text-align:center; }
  .btn .lbl { flex:1 1 auto; min-width:0; text-align:left; }
  .btn .sub { display:block; font-size:12px; font-weight:500; opacity:.8; margin-top:2px; }
  .store-row { display:flex; gap:10px; margin:12px 0; }
  .store-row .btn { margin:0; flex:1 1 0; padding:14px 14px; }
  .store .ico { font-size:18px; }
  .store-row .badge { flex:1 1 0; display:block; border-radius:9px; overflow:hidden; transition:transform .08s ease; }
  .store-row .badge:active { transform:scale(.985); }
  .store-row .badge svg { display:block; width:100%; height:auto; }
  .shots { display:flex; gap:10px; justify-content:center; margin:22px 0 28px; }
  .shots img { width:32%; max-width:130px; height:auto; border-radius:14px;
    border:1px solid #27457a; box-shadow:0 8px 22px rgba(0,0,0,.35); background:var(--navy2); }
  .foot { margin-top:30px; font-size:12px; color:#94a3b8; line-height:1.8; }
  .foot a { color:#94a3b8; }
</style>
</head>
<body>
  <main class="wrap">
    <div class="langs" id="langs"></div>
    <img class="logo" src="https://provider.skipily.app/icon-192.png" width="88" height="88" alt="Skipily">
    <h1>SKIPILY</h1>
    <p class="tag">ALWAYS · SAFE · READY TO SAIL</p>
    <p class="lead" data-i="lead">Werften, Service & Shops auf einer Karte — und ein KI-Bootsingenieur, der dein Boot kennt.</p>

    <div class="shots">
      <img src="assets/app-map.jpg" width="460" height="1000" loading="lazy" alt="Skipily map with marine service providers">
      <img src="assets/app-ki.jpg" width="460" height="1000" loading="lazy" alt="AI boat assistant chat">
      <img src="assets/app-boats.jpg" width="460" height="1000" loading="lazy" alt="Boat profile with equipment in the app">
    </div>

    <div class="store-row">
      <!-- iOS: offizieller App-Store-Badge (Apple-Freigabe liegt vor) -->
      <a class="badge" id="cta-app" href="https://apps.apple.com/app/id6757314378" aria-label="Download on the App Store">
        <svg viewBox="0 0 120 40" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Download on the App Store">
          <rect x="0.5" y="0.5" width="119" height="39" rx="8.5" fill="#000" stroke="#A6A6A6" stroke-width="0.5"/>
          <path fill="#fff" transform="translate(10.5,9) scale(0.62)" d="M16.365 1.43c0 1.14-.493 2.27-1.177 3.08-.744.9-1.99 1.57-2.987 1.57-.12 0-.23-.02-.3-.03-.01-.06-.04-.22-.04-.39 0-1.15.572-2.27 1.206-2.98.804-.94 2.142-1.64 3.248-1.68.03.13.05.28.05.43zm4.565 15.71c-.03.07-.463 1.58-1.518 3.12-.945 1.34-1.94 2.71-3.43 2.71-1.517 0-1.9-.88-3.63-.88-1.698 0-2.302.91-3.67.91-1.377 0-2.332-1.26-3.428-2.8-1.287-1.82-2.323-4.63-2.323-7.28 0-4.28 2.797-6.55 5.552-6.55 1.448 0 2.675.95 3.6.95.865 0 2.222-1.01 3.902-1.01.613 0 2.886.06 4.374 2.19-.13.09-2.383 1.37-2.383 4.19 0 3.26 2.854 4.42 2.955 4.45z"/>
          <text x="41" y="15.5" fill="#fff" font-family="Helvetica,Arial,sans-serif" font-size="6.6">Download on the</text>
          <text x="40.5" y="31" fill="#fff" font-family="Helvetica,Arial,sans-serif" font-size="15.5" font-weight="600" letter-spacing="-0.3">App Store</text>
        </svg>
      </a>
      <!-- Android: Web-App (Google Play noch in Prüfung) -->
      <a class="badge" id="cta-web-android" href="https://skipily.app/?utm_source=linkinbio&utm_medium=social&utm_campaign=launch2026" aria-label="Web App for Android">
        <svg viewBox="0 0 120 40" xmlns="http://www.w3.org/2000/svg" role="img">
          <rect x="0.5" y="0.5" width="119" height="39" rx="8.5" fill="#000" stroke="#A6A6A6" stroke-width="0.5"/>
          <g transform="translate(11,9)" fill="none" stroke="#fff" stroke-width="1.3" stroke-linecap="round">
            <circle cx="11" cy="11" r="10.2"/>
            <ellipse cx="11" cy="11" rx="4.3" ry="10.2"/>
            <path d="M1 11 h20.4 M2.6 5.2 h16.8 M2.6 16.8 h16.8"/>
          </g>
          <text x="41" y="15.5" fill="#fff" font-family="Helvetica,Arial,sans-serif" font-size="6.6" data-i="webAppSmall">Open for Android</text>
          <text x="40.5" y="31" fill="#fff" font-family="Helvetica,Arial,sans-serif" font-size="15.5" font-weight="600" letter-spacing="-0.3" data-i="webAppBig">Web App</text>
        </svg>
      </a>
    </div>

    <a class="btn btn-secondary" id="cta-provider"
       href="https://provider.skipily.app/?utm_source=linkinbio&utm_medium=social&utm_campaign=launch2026">
      <span class="ico">⚓</span>
      <span class="lbl"><span data-i="providerLabel">Anbieter werden</span><span class="sub" data-i="providerSub">Profil beanspruchen · Werft, Service, Shop</span></span>
    </a>

    <a class="btn btn-secondary" id="cta-web"
       href="https://skipily.app/?utm_source=linkinbio&utm_medium=social&utm_campaign=launch2026">
      <span class="ico">🌐</span>
      <span class="lbl"><span data-i="webLabel">Mehr über Skipily</span><span class="sub">skipily.app</span></span>
    </a>

    <p class="foot">
      <a href="https://skipily.app/impressum" data-i="imprint">Impressum</a> ·
      <a href="https://skipily.app/datenschutz" data-i="privacy">Datenschutz</a>
    </p>
  </main>

  <script>
    var I18N = {
      de: { lead: "Werften, Service & Shops auf einer Karte — und ein KI-Bootsingenieur, der dein Boot kennt.",
            providerLabel: "Anbieter werden", providerSub: "Profil beanspruchen · Werft, Service, Shop",
            webLabel: "Mehr über Skipily", imprint: "Impressum", privacy: "Datenschutz",
            webAppSmall: "Für Android öffnen", webAppBig: "Web-App" },
      en: { lead: "Boatyards, services & shops on one map — plus an AI boat engineer that knows your boat.",
            providerLabel: "Become a provider", providerSub: "Claim your profile · yard, service, shop",
            webLabel: "More about Skipily", imprint: "Imprint", privacy: "Privacy",
            webAppSmall: "Open for Android", webAppBig: "Web App" },
      fr: { lead: "Chantiers, services et boutiques sur une carte — et un ingénieur bateau IA qui connaît votre bateau.",
            providerLabel: "Devenir prestataire", providerSub: "Revendiquer votre profil · chantier, service, boutique",
            webLabel: "En savoir plus", imprint: "Mentions légales", privacy: "Confidentialité",
            webAppSmall: "Ouvrir sur Android", webAppBig: "Web App" },
      it: { lead: "Cantieri, servizi e negozi su una mappa — più un ingegnere di bordo IA che conosce la tua barca.",
            providerLabel: "Diventa fornitore", providerSub: "Rivendica il tuo profilo · cantiere, servizio, negozio",
            webLabel: "Scopri di più", imprint: "Note legali", privacy: "Privacy",
            webAppSmall: "Apri su Android", webAppBig: "Web App" },
      es: { lead: "Astilleros, servicios y tiendas en un mapa — y un ingeniero náutico con IA que conoce tu barco.",
            providerLabel: "Hazte proveedor", providerSub: "Reclama tu perfil · astillero, servicio, tienda",
            webLabel: "Más sobre Skipily", imprint: "Aviso legal", privacy: "Privacidad",
            webAppSmall: "Abrir en Android", webAppBig: "Web App" },
      nl: { lead: "Werven, service en shops op één kaart — plus een AI-bootingenieur die je boot kent.",
            providerLabel: "Word aanbieder", providerSub: "Claim je profiel · werf, service, shop",
            webLabel: "Meer over Skipily", imprint: "Colofon", privacy: "Privacy",
            webAppSmall: "Openen op Android", webAppBig: "Web-app" }
    };
    var SUP = Object.keys(I18N);
    var NAMES = { de: "DE", en: "EN", fr: "FR", it: "IT", es: "ES", nl: "NL" };

    function applyLang(lang) {
      var t = I18N[lang]; if (!t) return;
      document.querySelectorAll('[data-i]').forEach(function (el) {
        var k = el.getAttribute('data-i'); if (t[k]) el.textContent = t[k];
      });
      document.documentElement.lang = lang;
      document.querySelectorAll('#langs button').forEach(function (b) {
        b.classList.toggle('active', b.dataset.lang === lang);
      });
      try { localStorage.setItem('skipily_lang', lang); } catch (e) {}
    }

    (function () {
      var sw = document.getElementById('langs');
      SUP.forEach(function (l) {
        var b = document.createElement('button');
        b.textContent = NAMES[l]; b.dataset.lang = l;
        b.addEventListener('click', function () { applyLang(l); });
        sw.appendChild(b);
      });
      var p = new URLSearchParams(location.search);
      var stored; try { stored = localStorage.getItem('skipily_lang'); } catch (e) {}
      var nav = (navigator.language || 'en').slice(0, 2).toLowerCase();
      var lang = [p.get('lang'), stored, nav].find(function (c) { return SUP.indexOf(c) !== -1; }) || 'en';
      applyLang(lang);

      // utm_source/ct an die ausgehenden Links weiterreichen.
      var src = p.get('utm_source') || 'linkinbio';
      var camp = p.get('utm_campaign') || 'launch2026';
      function tagWeb(id) {
        var el = document.getElementById(id); if (!el) return;
        var u = new URL(el.getAttribute('href'));
        u.searchParams.set('utm_source', src); u.searchParams.set('utm_medium', 'social'); u.searchParams.set('utm_campaign', camp);
        el.setAttribute('href', u.toString());
      }
      function tagApp(id) {
        var el = document.getElementById(id); if (!el) return;
        var u = new URL(el.getAttribute('href'));
        u.searchParams.set('ct', (src + '-' + camp).slice(0, 40));
        el.setAttribute('href', u.toString());
      }
      tagApp('cta-app'); tagWeb('cta-web-android'); tagWeb('cta-provider'); tagWeb('cta-web');
    })();
  </script>
</body>
</html>
