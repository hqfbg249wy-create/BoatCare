<!-- ==========================================================
     Admin-Web: Provider einladen
     --------------------------------------------------------
     Zum Einbinden in die bestehende Admin-Seite:
       <iframe src="invite-provider.html" style="border:0; width:100%; height:520px;"></iframe>
     Oder Button + Modal: Inhalte aus <body> in vorhandene Seite kopieren.
     ========================================================== -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Provider einladen</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
  * { box-sizing: border-box; }
  body { font-family: system-ui,-apple-system,sans-serif; padding: 24px; background:#f8fafc; color:#0f172a; }
  h2   { margin: 0 0 16px; }
  label{ display:block; margin:14px 0 6px; font-weight:600; font-size:14px; }
  input, select {
    width: 100%; padding: 10px 12px; border:1px solid #cbd5e1; border-radius:8px;
    font-size:14px; background:#fff;
  }
  button {
    margin-top: 22px; padding: 12px 20px; background:#f56200; color:#fff;
    border:0; border-radius:8px; font-size:15px; font-weight:600; cursor:pointer; width:100%;
  }
  button:disabled { opacity: .55; cursor: not-allowed; }
  .msg { margin-top:16px; padding:12px; border-radius:8px; font-size:14px; }
  .ok  { background:#dcfce7; color:#14532d; }
  .err { background:#fee2e2; color:#7f1d1d; }
  .hint{ font-size:12px; color:#64748b; margin-top:4px; }
</style>
</head>
<body>

<h2>🛥️ Neuen Provider einladen</h2>
<p class="hint">Der Provider bekommt einen Magic-Link per E-Mail und kann sein Passwort setzen. Ein Profil in <code>service_providers</code> wird automatisch angelegt.</p>

<form id="inviteForm">
  <label>E-Mail *</label>
  <input type="email" name="email" required placeholder="kontakt@muster-werft.de">

  <label>Firmenname *</label>
  <input type="text"  name="company_name" required placeholder="Musterwerft GmbH">

  <label>Kategorie</label>
  <select name="category">
    <option value="repair">Reparatur / Werft</option>
    <option value="marina">Marina / Liegeplatz</option>
    <option value="chandlery">Bootszubehör</option>
    <option value="sailmaker">Segelmacher</option>
    <option value="engine">Motorenservice</option>
    <option value="electric">Elektrik / Elektronik</option>
    <option value="other">Sonstiges</option>
  </select>

  <label>Stadt</label>
  <input type="text" name="city" placeholder="Hamburg">

  <button type="submit" id="submitBtn">Einladung senden</button>
</form>

<div id="msg"></div>

<script>
  // Greift auf window.SUPABASE_URL / window.SUPABASE_ANON_KEY aus config.js zu
  const SB_URL  = window.SUPABASE_URL;
  const SB_ANON = window.SUPABASE_ANON_KEY;
  const supa = window.supabase.createClient(SB_URL, SB_ANON);

  const form = document.getElementById('inviteForm');
  const msg  = document.getElementById('msg');
  const btn  = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    msg.innerHTML = '';
    btn.disabled  = true;
    btn.textContent = 'Sende…';

    try {
      // Session-Token (Admin muss im Admin-Panel eingeloggt sein)
      const { data: { session } } = await supa.auth.getSession();
      if (!session) throw new Error('Nicht angemeldet. Bitte im Admin-Panel einloggen.');

      const payload = Object.fromEntries(new FormData(form).entries());

      const res = await fetch(`${SB_URL}/functions/v1/invite-provider`, {
        method:  'POST',
        headers: {
          'Content-Type':  'application/json',
          'Authorization': `Bearer ${session.access_token}`,
          'apikey':        SB_ANON,
        },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Fehler beim Einladen');

      msg.innerHTML = `<div class="msg ok">✓ Einladung an <strong>${data.email}</strong> gesendet.<br>User-ID: <code>${data.user_id}</code></div>`;
      form.reset();
    } catch (err) {
      msg.innerHTML = `<div class="msg err">✗ ${err.message}</div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Einladung senden';
    }
  });
</script>

</body>
</html>
