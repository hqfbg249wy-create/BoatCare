<!DOCTYPE html>
<html>
<head>
    <title>Supabase Test</title>
    <style>
        body { font-family: Arial; padding: 40px; background: #f5f5f5; }
        .box { background: white; padding: 20px; border-radius: 8px; margin: 10px 0; }
        .success { background: #d1fae5; color: #065f46; }
        .error { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
    <h1>🔍 Supabase Connection Test</h1>

    <div id="test1" class="box">1️⃣ Lade Supabase Library...</div>
    <div id="test2" class="box">2️⃣ Erstelle Client...</div>
    <div id="test3" class="box">3️⃣ Teste Datenbankverbindung...</div>
    <div id="test4" class="box">4️⃣ Login Test...</div>

    <div class="box">
        <h3>Login Test</h3>
        <input type="email" id="email" placeholder="E-Mail" style="padding: 10px; width: 300px;">
        <input type="password" id="password" placeholder="Passwort" style="padding: 10px; width: 300px; margin-top: 10px;">
        <button onclick="testLogin()" style="padding: 10px 20px; margin-top: 10px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer;">
            Login testen
        </button>
    </div>

    <div id="result" class="box"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        let supabase;

        async function runTests() {
            // Test 1: Supabase Library geladen?
            if (typeof window.supabase !== 'undefined') {
                document.getElementById('test1').className = 'box success';
                document.getElementById('test1').innerHTML = '1️⃣ ✅ Supabase Library geladen';
            } else {
                document.getElementById('test1').className = 'box error';
                document.getElementById('test1').innerHTML = '1️⃣ ❌ Supabase Library konnte nicht geladen werden';
                return;
            }

            // Test 2: Client erstellen
            try {
                const { createClient } = window.supabase;
                supabase = createClient(
                    'https://vcjwlyqkfkszumdrfvtm.supabase.co',
                    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZjandseXFrZmtzenVtZHJmdnRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkxMDQ4NTksImV4cCI6MjA4NDY4MDg1OX0.VOlhRdvShU325xG18SSSTWdFfGEdyeX-7CAovE2vesQ'
                );
                document.getElementById('test2').className = 'box success';
                document.getElementById('test2').innerHTML = '2️⃣ ✅ Supabase Client erstellt';
            } catch (error) {
                document.getElementById('test2').className = 'box error';
                document.getElementById('test2').innerHTML = '2️⃣ ❌ Fehler beim Erstellen: ' + error.message;
                return;
            }

            // Test 3: Datenbankverbindung
            try {
                const { data, error } = await supabase
                    .from('service_providers')
                    .select('id')
                    .limit(1);

                if (error) {
                    document.getElementById('test3').className = 'box error';
                    document.getElementById('test3').innerHTML = '3️⃣ ❌ DB-Fehler: ' + error.message;
                } else {
                    document.getElementById('test3').className = 'box success';
                    document.getElementById('test3').innerHTML = '3️⃣ ✅ Datenbankverbindung funktioniert! Gefunden: ' + (data?.length || 0) + ' Einträge';
                }
            } catch (error) {
                document.getElementById('test3').className = 'box error';
                document.getElementById('test3').innerHTML = '3️⃣ ❌ Exception: ' + error.message;
            }
        }

        async function testLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                alert('Bitte E-Mail und Passwort eingeben');
                return;
            }

            const resultDiv = document.getElementById('test4');
            resultDiv.innerHTML = '4️⃣ Login läuft...';

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) {
                    resultDiv.className = 'box error';
                    resultDiv.innerHTML = '4️⃣ ❌ Login fehlgeschlagen: ' + error.message;
                    document.getElementById('result').className = 'box error';
                    document.getElementById('result').innerHTML = '<strong>Login-Fehler:</strong><br>' + error.message;
                } else {
                    resultDiv.className = 'box success';
                    resultDiv.innerHTML = '4️⃣ ✅ Login erfolgreich!';
                    document.getElementById('result').className = 'box success';
                    document.getElementById('result').innerHTML = `
                        <strong>✅ LOGIN ERFOLGREICH!</strong><br>
                        User: ${data.user.email}<br>
                        ID: ${data.user.id}<br><br>
                        <strong>Alle Tests bestanden! Die Admin-Website sollte funktionieren.</strong>
                    `;
                }
            } catch (error) {
                resultDiv.className = 'box error';
                resultDiv.innerHTML = '4️⃣ ❌ Exception: ' + error.message;
                document.getElementById('result').className = 'box error';
                document.getElementById('result').innerHTML = '<strong>Exception:</strong><br>' + error.message;
            }
        }

        // Tests starten beim Laden
        window.onload = () => {
            setTimeout(runTests, 500);
        };
    </script>
</body>
</html>
