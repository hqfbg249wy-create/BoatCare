# fly.toml app configuration file generated for skipily-scraper on 2026-06-09T18:51:42+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'skipily-scraper'
primary_region = 'fra'

[build]
  builder = 'heroku/builder:24'

[env]
  NODE_ENV = 'production'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  # Eine Maschine dauerhaft laufen lassen: sonst stoppt Fly die Maschine,
  # sobald kein HTTP-Request offen ist, und killt losgeloeste Hintergrund-Jobs
  # (CleverReach-Sprach-Sync, Geo-Job) mittendrin.
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'get'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
